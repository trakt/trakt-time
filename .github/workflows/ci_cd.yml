name: CI / CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: read

concurrency:
  # Re-run only the latest commit per branch; cancel anything in flight.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Figures out which downstream jobs need to run for this PR/push.
  # Anything outside `client_source` / `workflows` doesn't trigger CI.
  changed-paths:
    name: Detect what changed
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Compute path filters
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            client:
              - 'projects/client/src/**'
              - 'projects/client/static/**'
              - 'projects/client/i18n/messages/**'
              - 'projects/client/i18n/project.inlang/**'
              - 'projects/client/package.json'
              - 'projects/client/deno.json'
              - 'projects/client/svelte.config.js'
              - 'projects/client/vite.config.ts'
              - 'projects/client/wrangler.jsonc'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'

  # `svelte-check` over the whole client tree.
  typecheck:
    name: Type check the client
    needs: changed-paths
    if: ${{ needs.changed-paths.outputs.client == 'true' || needs.changed-paths.outputs.workflows == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: ./.github/actions/setup-deno

      - name: Run svelte-check
        working-directory: projects/client
        run: deno task check

  # Vitest split across 4 shards so PRs come back fast.
  unit-tests:
    name: 'Unit tests · shard ${{ matrix.shard }} / 4'
    needs: changed-paths
    if: ${{ needs.changed-paths.outputs.client == 'true' || needs.changed-paths.outputs.workflows == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: ./.github/actions/setup-deno

      - name: Run vitest (shard ${{ matrix.shard }} of 4)
        working-directory: projects/client
        run: >
          deno run -A npm:vitest
          --shard=${{ matrix.shard }}/4
          --reporter=dot
          --reporter=github-actions

  # Aggregates the matrix above into a single required check.
  unit-tests-gate:
    name: Unit tests passed
    needs: [changed-paths, unit-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all shards
        run: |
          if [[ "${{ needs.unit-tests.result }}" == "success" || "${{ needs.unit-tests.result }}" == "skipped" ]]; then
            echo "All shards passed (or were skipped)."
          else
            echo "Unit-test shards failed with result: ${{ needs.unit-tests.result }}"
            exit 1
          fi

  # Builds the SvelteKit client and pushes the worker bundle to Cloudflare.
  # Only runs on `main` after both checks above pass.
  deploy:
    name: Build & deploy to Cloudflare Workers
    needs: [unit-tests-gate, typecheck]
    if: |
      always() &&
      needs.unit-tests-gate.result == 'success' &&
      needs.typecheck.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: ./.github/actions/setup-deno

      - name: Build the client
        working-directory: projects/client
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
        run: deno task build

      - name: Deploy the worker via wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/client
          command: deploy
