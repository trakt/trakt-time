name: CI / CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: read

concurrency:
  # One in-flight run per branch — newer pushes cancel older ones.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Vitest in a single job. Sharding only earns its keep once the suite
  # is large enough that the per-job startup cost is small relative to
  # total runtime; we'll re-introduce the matrix when we get there.
  unit-tests:
    name: Unit tests
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: ./.github/actions/setup-deno

      - name: Run vitest
        working-directory: projects/client
        run: deno run -A npm:vitest --reporter=dot --reporter=github-actions

  # Builds the SvelteKit client and ships the worker bundle to Cloudflare.
  # Only on `main`, only after tests pass.
  deploy:
    name: Build & deploy to Cloudflare Workers
    needs: unit-tests
    if: |
      needs.unit-tests.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: ./.github/actions/setup-deno

      - name: Build the client
        working-directory: projects/client
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
        run: deno task build

      - name: Deploy the worker via wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/client
          command: deploy
