name: CI / CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: read

concurrency:
  # One in-flight run per branch — newer pushes cancel older ones.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Vitest split across 4 shards so PRs come back fast.
  unit-tests:
    name: 'Unit tests · shard ${{ matrix.shard }} / 4'
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: ./.github/actions/setup-deno

      - name: Run vitest (shard ${{ matrix.shard }} of 4)
        working-directory: projects/client
        run: >
          deno run -A npm:vitest
          --shard=${{ matrix.shard }}/4
          --reporter=dot
          --reporter=github-actions

  # Aggregates the matrix above into a single required check the deploy can
  # gate on without enumerating every shard.
  unit-tests-gate:
    name: Unit tests passed
    needs: unit-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all shards
        run: |
          if [[ "${{ needs.unit-tests.result }}" == "success" ]]; then
            echo "All shards passed."
          else
            echo "Unit-test shards failed with result: ${{ needs.unit-tests.result }}"
            exit 1
          fi

  # Builds the SvelteKit client and ships the worker bundle to Cloudflare.
  # Only on `main`, only after tests pass.
  deploy:
    name: Build & deploy to Cloudflare Workers
    needs: unit-tests-gate
    if: |
      needs.unit-tests-gate.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: ./.github/actions/setup-deno

      - name: Build the client
        working-directory: projects/client
        env:
          TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID }}
        run: deno task build

      - name: Deploy the worker via wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: projects/client
          command: deploy
