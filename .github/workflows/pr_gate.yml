name: PR Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  # Validates commit messages against commitlint.config.js and refuses any
  # leftover `fixup!` commits that didn't get squashed.
  commitlint:
    name: Lint commit messages
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@v3

      - name: Refuse fixup commits
        uses: vladjerca/no-fixups-action@main
        with:
          skip-checkout: true
