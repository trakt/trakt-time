<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 48 48">
  <!--
    Maskable variant: full-bleed gradient (Android crops the corners),
    T scaled to fit the 80% safe zone.
  -->
  <defs>
    <linearGradient id="trakttime-bg-mask" x1="0" y1="48" x2="48" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e02760" />
      <stop offset="100%" stop-color="#9f42c6" />
    </linearGradient>
  </defs>

  <rect width="48" height="48" fill="url(#trakttime-bg-mask)" />

  <g stroke="#fff" stroke-width="2.2" stroke-linecap="round">
    <!-- Top bar — pulled in to fit the safe zone. -->
    <line x1="13" y1="15" x2="35" y2="15" />
    <line x1="13" y1="18.5" x2="35" y2="18.5" />
    <line x1="13" y1="22" x2="35" y2="22" />

    <!-- Stem -->
    <line x1="20.5" y1="23" x2="20.5" y2="38" />
    <line x1="24" y1="23" x2="24" y2="38" />
    <line x1="27.5" y1="23" x2="27.5" y2="38" />
  </g>
</svg>
