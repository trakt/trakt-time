<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!--
    Trakt Time — Trakt's parallel-stroke check, reshaped into TV Time's
    bold geometric T. Bar and stem are each three white parallels on the
    Trakt rose-to-purple gradient.
  -->
  <defs>
    <linearGradient id="trakttime-bg" x1="0" y1="48" x2="48" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e02760" />
      <stop offset="100%" stop-color="#9f42c6" />
    </linearGradient>
  </defs>

  <rect width="48" height="48" rx="11" fill="url(#trakttime-bg)" />

  <g stroke="#fff" stroke-width="2.4" stroke-linecap="round">
    <!-- Top bar — three parallel horizontals (Trakt's stripe motif). -->
    <line x1="11" y1="14" x2="37" y2="14" />
    <line x1="11" y1="18" x2="37" y2="18" />
    <line x1="11" y1="22" x2="37" y2="22" />

    <!-- Stem — three parallel verticals (TV Time's T, restated in Trakt's grammar). -->
    <line x1="20" y1="23" x2="20" y2="40" />
    <line x1="24" y1="23" x2="24" y2="40" />
    <line x1="28" y1="23" x2="28" y2="40" />
  </g>
</svg>
